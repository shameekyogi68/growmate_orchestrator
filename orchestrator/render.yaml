services:
  - type: web
    name: growmate-backend
    env: docker
    rootDir: orchestrator
    region: oregon
    plan: starter # Optimized for production consistency
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        generateValue: false # Set your Supabase Connection String here
      - key: REDIS_URL
        fromService:
          type: redis
          name: growmate-redis
          envVarKey: REDIS_URL
      - key: JWT_SECRET_KEY
        generateValue: true # Auto-generated by Render
      - key: AGRO_API_KEY
        sync: false # Set in Render Settings
      - key: WEATHER_API_KEY
        sync: false # Set in Render Settings
      - key: INDIA_DATA_API_KEY
        sync: false # Set in Render Settings

  - type: redis
    name: growmate-redis
    region: oregon
    plan: free
    maxMemoryPolicy: allkeys-lru
