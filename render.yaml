services:
  - type: web
    name: growmate-orchestrator
    env: docker
    dockerfilePath: ./orchestrator/Dockerfile
    dockerContext: ./orchestrator
    region: oregon 
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # Set your Supabase Connection String (Transaction mode) in Render Dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: growmate-redis
          envVarKey: REDIS_URL
      - key: JWT_SECRET_KEY
        value: growmate-udupi-production-secret-2026
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: firebase-service-account.json
      - key: AGRO_API_KEY
        value: df7622427073c797ad1469a4292c531c
      - key: WEATHER_API_KEY
        value: AFYJ2EVFQHYWZLEERM8TWE9U8
      - key: INDIA_DATA_API_KEY
        value: 579b464db66ec23bdd000001873b31d09b8d40434c4b9427455cd66d

  - type: redis
    name: growmate-redis
    region: oregon
    plan: free
    maxMemoryPolicy: allkeys-lru
